<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <h1>Flashcards</h1>
    <button>Add Deck</button>
  </header>

  <!-- MAIN LAYOUT -->
  <div class="layout">

    <!-- SIDEBAR -->
    <nav aria-label="Decks">
      <h2>Your Decks</h2>
      <ul class="deck-list">
        <li><button>Math</button></li>
        <li><button>Science</button></li>
        <li><button>History</button></li>
      </ul>
    </nav>

    <!-- MAIN CONTENT -->
    <main>
      <section class="card-section">
        <div class="flashcard">
          <p>What is the capital of France?</p>
        </div>

        <div class="card-actions">
          <button>Show Answer</button>
          <button>Next</button>
        </div>
      </section>
    </main>

  </div>

  <!-- FOOTER -->
  <footer>
    <p>&copy; 2026 Flashcards App</p>
  </footer>

</body>
</html>
